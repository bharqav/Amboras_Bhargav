version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: amboras-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: amboras
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: amboras-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
